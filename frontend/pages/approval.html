<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1428a0">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <title>审批管理 - 三星事业部</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .approval-card { padding: 14px 16px; border: 1px solid var(--gray-200); border-radius: var(--radius); margin-bottom: 10px; transition: all .2s; }
        .approval-card:hover { border-color: var(--primary); }
        .approval-type { font-size: 11px; padding: 2px 10px; border-radius: 10px; font-weight: 600; }
        .approval-type.leave { background: #fce7f3; color: #9d174d; }
        .approval-type.expense { background: #fef3c7; color: #92400e; }
        .approval-type.purchase { background: #d1fae5; color: #065f46; }
        .approval-type.general { background: #e0e7ff; color: #3730a3; }
        .status-badge { font-size: 12px; padding: 3px 10px; border-radius: 10px; font-weight: 600; }
        .status-badge.pending { background: #fef3c7; color: #92400e; }
        .status-badge.approved { background: #d1fae5; color: #065f46; }
        .status-badge.rejected { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
<div class="app-layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-content">
        <div class="topbar" id="topbar"></div>
        <div class="page-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                <div style="display:flex; gap:12px;">
                    <button class="btn" id="tabPending" style="padding:8px 16px; border:1px solid var(--gray-200); border-radius:var(--radius); background:var(--primary); color:#fff;" onclick="switchTab('pending')">待审批</button>
                    <button class="btn" id="tabMy" style="padding:8px 16px; border:1px solid var(--gray-200); border-radius:var(--radius);" onclick="switchTab('my')">我的申请</button>
                    <button class="btn" id="tabAll" style="padding:8px 16px; border:1px solid var(--gray-200); border-radius:var(--radius);" onclick="switchTab('all')">全部</button>
                </div>
                <button class="btn btn-primary" style="width:auto; padding:8px 16px;" onclick="showSubmitModal()">+ 提交申请</button>
            </div>

            <!-- 统计 -->
            <div class="stats-grid" id="statsCards"></div>

            <div id="approvalList" style="margin-top:16px;"></div>
        </div>
    </div>
</div>

<!-- 提交弹窗 -->
<div class="modal-overlay" id="submitModal">
    <div class="modal-content" style="width:480px;">
        <div class="modal-header"><h3>提交审批</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
        <div class="modal-body">
            <div class="form-group"><label>标题</label><input type="text" id="apprTitle" style="width:100%;" placeholder="请输入审批标题"></div>
            <div class="form-group"><label>类型</label>
                <select id="apprType" style="width:100%;">
                    <option value="general">📋 通用审批</option>
                    <option value="leave">🏖️ 请假申请</option>
                    <option value="expense">💰 报销申请</option>
                    <option value="purchase">📦 采购申请</option>
                </select>
            </div>
            <div class="form-group"><label>详细说明</label><textarea id="apprContent" rows="4" style="width:100%;" placeholder="请描述审批内容"></textarea></div>
        </div>
        <div class="modal-footer">
            <button class="btn" onclick="closeModal()">取消</button>
            <button class="btn btn-primary" style="width:auto;" onclick="submitApproval()">提交</button>
        </div>
    </div>
</div>

<script src="/js/app.js"></script>
<script>
let currentTab = 'pending';

document.addEventListener('DOMContentLoaded', async () => {
    if (!App.init()) return;
    App.renderSidebar('approval');
    App.renderTopbar('审批管理');
    await loadApprovals();
});

function switchTab(tab) {
    currentTab = tab;
    ['pending','my','all'].forEach(t => {
        const btn = document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1));
        btn.style.background = t === tab ? 'var(--primary)' : '#fff';
        btn.style.color = t === tab ? '#fff' : 'var(--gray-700)';
    });
    loadApprovals();
}

async function loadApprovals() {
    try {
        const data = await App.api(`/approval/list?tab=${currentTab}&token=${App.token}`);
        const approvals = data.approvals || [];
        renderStats(approvals);
        renderList(approvals);
    } catch(e) { console.error(e); }
}

function renderStats(approvals) {
    const pending = approvals.filter(a => a.status === 'pending').length;
    const approved = approvals.filter(a => a.status === 'approved').length;
    const rejected = approvals.filter(a => a.status === 'rejected').length;
    document.getElementById('statsCards').innerHTML = `
        <div class="stat-card"><div class="stat-icon orange">⏳</div><div class="stat-info"><h4>${pending}</h4><p>待审批</p></div></div>
        <div class="stat-card"><div class="stat-icon green">✅</div><div class="stat-info"><h4>${approved}</h4><p>已通过</p></div></div>
        <div class="stat-card"><div class="stat-icon red">❌</div><div class="stat-info"><h4>${rejected}</h4><p>已驳回</p></div></div>
    `;
}

function renderList(approvals) {
    if (!approvals.length) {
        document.getElementById('approvalList').innerHTML = '<p style="text-align:center; color:var(--gray-400); padding:40px;">暂无审批记录</p>';
        return;
    }
    document.getElementById('approvalList').innerHTML = approvals.map(a => `
        <div class="approval-card">
            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                <div style="flex:1;">
                    <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
                        <span class="approval-type ${a.approval_type}">${a.approval_type==='leave'?'请假':a.approval_type==='expense'?'报销':a.approval_type==='purchase'?'采购':'通用'}</span>
                        <strong>${a.title}</strong>
                        <span class="status-badge ${a.status}">${a.status==='pending'?'待审批':a.status==='approved'?'已通过':'已驳回'}</span>
                    </div>
                    ${a.content ? `<p style="font-size:13px; color:var(--gray-500); margin-top:6px;">${a.content}</p>` : ''}
                    <div style="font-size:12px; color:var(--gray-400); margin-top:6px;">
                        申请人: ${a.applicant_name} ${a.store_name ? '· '+a.store_name : ''} · ${a.created_at ? a.created_at.substring(5,16) : ''}
                        ${a.approver_name ? ' · 审批人: '+a.approver_name : ''}
                    </div>
                </div>
                ${a.status === 'pending' && App.user?.role === 'admin' ? `<div style="display:flex; gap:6px; flex-shrink:0;">
                    <button class="btn" style="padding:4px 10px; font-size:12px; background:#10b981; color:#fff; border:none;" onclick="approve(${a.id}, 'approved')">通过</button>
                    <button class="btn" style="padding:4px 10px; font-size:12px; background:#ef4444; color:#fff; border:none;" onclick="approve(${a.id}, 'rejected')">驳回</button>
                </div>` : ''}
            </div>
        </div>
    `).join('');
}

async function approve(id, status) {
    try {
        await App.api(`/approval/${id}/approve?token=${App.token}`, { method:'POST', body:{status} });
        App.toast(status==='approved'?'已通过':'已驳回', 'success');
        await loadApprovals();
    } catch(e) { App.toast('操作失败', 'error'); }
}

function showSubmitModal() { document.getElementById('submitModal').classList.add('show'); }
function closeModal() { document.getElementById('submitModal').classList.remove('show'); }

async function submitApproval() {
    const body = {
        title: document.getElementById('apprTitle').value,
        content: document.getElementById('apprContent').value,
        approval_type: document.getElementById('apprType').value,
    };
    if (!body.title) return App.toast('请输入标题', 'error');
    try {
        await App.api(`/approval/submit?token=${App.token}`, { method:'POST', body });
        App.toast('申请已提交', 'success');
        closeModal();
        document.getElementById('apprTitle').value = ''; document.getElementById('apprContent').value = '';
        await loadApprovals();
    } catch(e) { App.toast('提交失败: ' + e.message, 'error'); }
}
</script>
<script src="/js/ai-assistant.js?v=3.0"></script>
</body>
</html>
